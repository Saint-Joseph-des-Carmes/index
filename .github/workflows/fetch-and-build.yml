name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ----> Installation fiable grâce au lock‑file
      - name: Install dependencies (ci)
        run: npm ci

      # (facultatif) tests, lint, etc.
      - name: Run tests
        run: npm test

      # Déploiement… (Vercel, Pages, etc.)
