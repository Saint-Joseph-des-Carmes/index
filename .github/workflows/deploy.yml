name: Mirror Pro + Fix URLs
 
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  mirror-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          pip3 install beautifulsoup4 lxml

      - name: Mirror with Better Logic
        run: |
          rm -rf site && mkdir site
          # On limite la profondeur pour éviter de télécharger tout le web
          # --adjust-extension rajoute .html si besoin pour GitHub Pages
          wget \
            --recursive \
            --level=2 \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --no-parent \
            --no-host-directories \
            --directory-prefix=site \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true

      - name: Python Post-Processing (Hard Fix)
        shell: python
        run: |
          import os
          from bs4 import BeautifulSoup

          # 1. Remplacement texte et 2. Correction URLs
          for root, dirs, files in os.walk("site"):
              for file in files:
                  if file.endswith(".html"):
                      path = os.path.join(root, file)
                      with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                          soup = BeautifulSoup(f.read(), 'lxml')
                      
                      # Remplacement du texte
                      for text_node in soup.find_all(string=True):
                          if "Chanteur" in text_node:
                              new_text = text_node.replace("Chanteur", "Rapeur")
                              text_node.replace_with(new_text)

                      # Injection du script de MutationObserver amélioré
                      new_script = soup.new_tag("script")
                      new_script.string = """
                        const observer = new MutationObserver((mutations) => {
                          mutations.forEach((mutation) => {
                            mutation.addedNodes.forEach((node) => {
                              if (node.nodeType === 3) {
                                node.nodeValue = node.nodeValue.replace(/Chanteur/gi, 'Rapeur');
                              }
                            });
                          });
                        });
                        observer.observe(document.body, { childList: true, subtree: true });
                      """
                      if soup.body:
                          soup.body.append(new_script)

                      with open(path, 'w', encoding='utf-8') as f:
                          f.write(str(soup))

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
