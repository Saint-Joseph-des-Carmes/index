name: Mirror Pro - Fix 404

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  mirror-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          pip3 install beautifulsoup4 lxml

      - name: Mirror Site
        run: |
          rm -rf _temp_mirror site
          mkdir _temp_mirror site
          
          # Aspiration dans un dossier temporaire
          wget \
            --mirror \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --no-parent \
            --no-host-directories \
            --directory-prefix=_temp_mirror \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true

          # On déplace le contenu pour qu'il soit à la racine du futur site
          # wget --no-host-directories aurait dû le faire, mais on sécurise ici :
          cp -r _temp_mirror/. site/
          rm -rf _temp_mirror

      - name: Text Processing (Rappeur & MutationObserver)
        shell: python
        run: |
          import os, re
          from bs4 import BeautifulSoup

          for root, dirs, files in os.walk("site"):
              for file in files:
                  path = os.path.join(root, file)
                  if file.lower().endswith(('.html', '.htm', '.js', '.json', '.txt', '.css')):
                      try:
                          with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                              content = f.read()

                          # Remplacement "Chanteur" -> "Rappeur" (Correction orthographe)
                          content = re.sub(r'Chanteur', 'Rappeur', content)
                          content = re.sub(r'chanteur', 'rappeur', content)

                          if file.lower().endswith(('.html', '.htm')):
                              soup = BeautifulSoup(content, 'lxml')
                              
                              # On force les liens en relatifs pour éviter les 404 sur les sous-pages
                              # Et on injecte le script pour le contenu dynamique
                              script = soup.new_tag("script")
                              script.string = """
                                (function() {
                                  const fix = (n) => {
                                    if (n.nodeType === 3) n.nodeValue = n.nodeValue.replace(/Chanteur/gi, 'Rappeur');
                                    else n.childNodes.forEach(fix);
                                  };
                                  new MutationObserver(m => m.forEach(r => r.addedNodes.forEach(fix))).observe(document, {childList:true, subtree:true});
                                  window.addEventListener('DOMContentLoaded', () => fix(document.body));
                                })();
                              """
                              if soup.body: soup.body.append(script)
                              content = str(soup)

                          with open(path, 'w', encoding='utf-8') as f:
                              f.write(content)
                      except Exception as e:
                          print(f"Erreur: {e}")

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
