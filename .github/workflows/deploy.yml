name: Mirror Complet - Correction Finale 404

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: pip3 install beautifulsoup4 lxml

      - name: Mirroring (Anti-404 Config)
        run: |
          rm -rf site
          mkdir -p site
          # -nH : supprime le dossier du nom de domaine
          # --no-parent : ne remonte pas au dessus du site
          wget \
            --mirror \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --no-parent \
            --no-host-directories \
            --directory-prefix=site \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true

      - name: Python Processing (Relative Paths & Rappeur)
        shell: python
        run: |
          import os, re
          from bs4 import BeautifulSoup

          # Script MutationObserver (Correction orthographe : Rappeur)
          js_fix = """
          <script>
          (function(){
            const fix = (n) => {
              if(n.nodeType === 3) n.nodeValue = n.nodeValue.replace(/Chanteur/gi, 'Rappeur');
              else n.childNodes.forEach(fix);
            };
            new MutationObserver(m => m.forEach(r => r.addedNodes.forEach(fix))).observe(document, {childList:true, subtree:true});
            window.addEventListener('DOMContentLoaded', () => fix(document.body));
          })();
          </script>
          """

          for root, _, files in os.walk("site"):
              for f in files:
                  path = os.path.join(root, f)
                  if f.lower().endswith(('.html', '.htm', '.js', '.css', '.json')):
                      try:
                          with open(path, 'r', encoding='utf-8', errors='ignore') as file:
                              content = file.read()
                          
                          # 1. Remplacement texte (Chanteur -> Rappeur)
                          content = re.sub(r'Chanteur', 'Rappeur', content)
                          content = re.sub(r'chanteur', 'rappeur', content)

                          # 2. Correction des URLs ABSOLUES en RELATIVES (Crucial pour éviter 404)
                          # On remplace les src="/... et href="/... par src="./... et href="./...
                          if f.lower().endswith(('.html', '.htm', '.css')):
                              content = re.sub(r'href="/', 'href="./', content)
                              content = re.sub(r'src="/', 'src="./', content)
                          
                          # 3. Injection JS dans le HTML
                          if f.lower().endswith(('.html', '.htm')) and "</body>" in content:
                              content = content.replace("</body>", js_fix + "</body>")
                          
                          with open(path, 'w', encoding='utf-8') as file:
                              file.write(content)
                      except: pass

      - name: Commit site/ folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/
          if git diff --cached --quiet; then
            echo "Pas de changements"
          else
            git commit -m "Mirror update $(date)"
            git push origin main
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site # On déploie directement le contenu de site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
