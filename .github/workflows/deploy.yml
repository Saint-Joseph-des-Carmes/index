name: Mirror Final - Depot Index Fix

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirroring (Strict Root)
        run: |
          rm -rf site && mkdir site
          wget \
            --mirror \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --no-parent \
            --no-host-directories \
            --directory-prefix=site \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true

      - name: Text Processing (Rappeur & Absolute Fix)
        shell: python
        run: |
          import os, re
          
          js_fix = """
          <script>
          (function(){
            const fix = (n) => {
              if(n.nodeType === 3) n.nodeValue = n.nodeValue.replace(/Chanteur/gi, 'Rappeur');
              else n.childNodes.forEach(fix);
            };
            new MutationObserver(m => m.forEach(r => r.addedNodes.forEach(fix))).observe(document, {childList:true, subtree:true});
            window.addEventListener('DOMContentLoaded', () => fix(document.body));
          })();
          </script>
          """

          for root, _, files in os.walk("site"):
              for f in files:
                  path = os.path.join(root, f)
                  if f.lower().endswith(('.html', '.htm', '.js', '.css')):
                      try:
                          with open(path, 'r', encoding='utf-8', errors='ignore') as file:
                              content = file.read()
                          
                          # 1. Remplacement "Rappeur" (2 'p')
                          content = content.replace("Chanteur", "Rappeur").replace("chanteur", "rappeur")
                          
                          # 2. Injection JS
                          if f.lower().endswith(('.html', '.htm')) and "</body>" in content:
                              content = content.replace("</body>", js_fix + "</body>")
                          
                          with open(path, 'w', encoding='utf-8') as file:
                              file.write(content)
                      except: pass

      - name: Create .nojekyll
        run: touch site/.nojekyll # Indispensable pour WordPress/fichiers avec underscores

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
