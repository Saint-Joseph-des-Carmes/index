name: Mirror Pro - Correction Rappeur

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  mirror-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          pip3 install beautifulsoup4 lxml

      - name: Mirror Site (Optimized wget)
        run: |
          rm -rf site && mkdir site
          # On télécharge avec des options qui préservent la structure locale
          wget \
            --recursive \
            --level=3 \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --no-parent \
            --no-host-directories \
            --directory-prefix=site \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true

      - name: Advanced Processing (Text & URLs)
        shell: python
        run: |
          import os, re
          from bs4 import BeautifulSoup

          def fix_content(root_dir):
              for root, dirs, files in os.walk(root_dir):
                  for file in files:
                      path = os.path.join(root, file)
                      
                      # On ne traite que les fichiers texte
                      if file.lower().endswith(('.html', '.htm', '.js', '.json', '.txt', '.css')):
                          try:
                              with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                                  content = f.read()

                              # 1. Remplacement textuel global (Correction orthographe incluse)
                              # On remplace Chanteur/chanteur par Rappeur/rappeur
                              content = re.sub(r'Chanteur', 'Rappeur', content)
                              content = re.sub(r'chanteur', 'rappeur', content)
                              content = re.sub(r'CHANTEUR', 'RAPPEUR', content)

                              # 2. Injection spécifique dans le HTML
                              if file.lower().endswith(('.html', '.htm')):
                                  soup = BeautifulSoup(content, 'lxml')
                                  
                                  # Injection du MutationObserver pour le contenu dynamique
                                  script_tag = soup.new_tag("script")
                                  script_tag.string = """
                                    (function() {
                                      const replaceText = (node) => {
                                        if (node.nodeType === 3) {
                                          node.nodeValue = node.nodeValue
                                            .replace(/Chanteur/g, 'Rappeur')
                                            .replace(/chanteur/g, 'rappeur');
                                        } else {
                                          node.childNodes.forEach(replaceText);
                                        }
                                      };
                                      const observer = new MutationObserver((mutations) => {
                                        mutations.forEach(m => m.addedNodes.forEach(replaceText));
                                      });
                                      document.addEventListener('DOMContentLoaded', () => {
                                        replaceText(document.body);
                                        observer.observe(document.body, { childList: true, subtree: true });
                                      });
                                    })();
                                  """
                                  if soup.body:
                                      soup.body.append(script_tag)
                                  content = str(soup)

                              with open(path, 'w', encoding='utf-8') as f:
                                  f.write(content)
                          except Exception as e:
                              print(f"Erreur sur {path}: {e}")

          fix_content("site")

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
