name: Mirror Complet - Correction Rappeur & 404

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  mirror-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # 1. Préparation du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Installation des outils
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget python3
          pip3 install --quiet beautifulsoup4 lxml

      # 3. Mirroring APLATIT (Correction de la 404)
      - name: Mirror with wget
        run: |
          rm -rf site
          mkdir -p site
          # -nH (no-host-directories) évite de créer le dossier 'www.saintjosephdescarmes.com'
          wget \
            --mirror \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --no-parent \
            --no-host-directories \
            --directory-prefix=site \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true

      # 4. Correction Orthographe (Rappeur) + Injection Script
      - name: Text replacement & Injection
        shell: python
        run: |
          import os, re
          from bs4 import BeautifulSoup

          # Script MutationObserver pour les contenus chargés en JS
          INJECTION = """<script>
          (function(){
            function fix(node){
              if(node.nodeType===3){
                node.nodeValue=node.nodeValue.replace(/Chanteur/gi,"Rappeur");
              } else {
                node.childNodes.forEach(fix);
              }
            }
            new MutationObserver(muts => muts.forEach(m => m.addedNodes.forEach(fix))).observe(document, {childList:true, subtree:true});
            window.addEventListener('DOMContentLoaded', () => fix(document.body));
          })();
          </script>"""

          for root, _, files in os.walk("site"):
              for f in files:
                  path = os.path.join(root, f)
                  if f.lower().endswith(('.html', '.htm', '.js', '.css', '.txt', '.json')):
                      try:
                          with open(path, 'r', encoding='utf-8', errors='ignore') as fh:
                              content = fh.read()
                          
                          # Correction orthographique globale
                          content = re.sub(r'Chanteur', 'Rappeur', content)
                          content = re.sub(r'chanteur', 'rappeur', content)
                          
                          # Injection dans le HTML
                          if f.lower().endswith(('.html', '.htm')) and "</body>" in content.lower():
                              content = content.replace("</body>", INJECTION + "</body>")
                          
                          with open(path, 'w', encoding='utf-8') as fh:
                              fh.write(content)
                      except: pass

      # 5. Commit des fichiers (Pour inspection)
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/
          if git diff --cached --quiet; then
            echo "Rien à committer"
          else
            git commit -m "MAJ Mirror : $(date -u)"
            git push origin main
          fi

      # 6. Déploiement sur GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        uses: actions/deploy-pages@v4
