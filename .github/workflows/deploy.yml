# .github/workflows/deploy.yml
# --------------------------------------------------------------
#  Miroir complet du site https://www.saintjosephdescarmes.com
#  - télécharge toutes les pages, assets, scripts, images…
#  - réécrit les URLs pour qu’elles deviennent *relatives* (et donc fonctionnent sur GitHub Pages)
#  - remplace chaque occurrence de « Chanteur » (singulier ou pluriel, casse insensible) par « Rapeur »
#  - injecte un MutationObserver afin que les contenus ajoutés dynamiquement (pop‑ups, overlays…) soient également corrigés
#  - commit le dossier complet `site/` dans le dépôt (vous n’avez rien à toucher)
#  - déploie le dossier `site/` sur GitHub Pages chaque heure
# --------------------------------------------------------------

name: Mirror‑site + Deploy (hourly)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'          # chaque heure, minute 0 (UTC)
  workflow_dispatch: {}         # déclenchement manuel depuis l’UI

permissions:
  contents: write                # pour faire le commit du dossier `site/`
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  mirror-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      # --------------------------------------------------------
      # 1️⃣ Checkout du dépôt (pour pouvoir ajouter le dossier site/)
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------------
      # 2️⃣ Installer les outils nécessaires (wget, python + bs4)
      # --------------------------------------------------------
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget curl python3 python3-pip
          pip3 install --quiet beautifulsoup4 lxml requests

      # --------------------------------------------------------
      # 3️⃣ Télécharger le site complet avec wget (mirror complet)
      # --------------------------------------------------------
      - name: Mirror full site with wget
        run: |
          # Nettoyage du répertoire précédent
          rm -rf _mirror
          mkdir -p _mirror

          wget \
            --mirror \
            --recursive \
            --no-parent \
            --page-requisites \
            --convert-links \
            --adjust-extension \
            --no-check-certificate \
            --no-verbose \
            --tries=5 \
            --wait=0.3 \
            --random-wait \
            --timeout=30 \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/122.0.0.0 Safari/537.36" \
            --header="Accept-Language: fr-FR,fr;q=0.9,en-US;q=0.8,en;q=0.7" \
            --header="Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            --span-hosts \
            --domains="saintjosephdescarmes.com,www.saintjosephdescarmes.com" \
            --directory-prefix=_mirror \
            https://www.saintjosephdescarmes.com 2>&1 | tail -30 || true

          echo "✅ Site mirroir téléchargé"

      # --------------------------------------------------------
      # 4️⃣ Organiser le contenu dans le dossier `site/`
      # --------------------------------------------------------
      - name: Move mirrored content to site/
        run: |
          rm -rf site
          mkdir -p site

          # Le répertoire créé par wget peut être soit www.saintjosephdescarmes.com soit saintjosephdescarmes.com
          if [ -d "_mirror/www.saintjosephdescarmes.com" ]; then
            cp -r _mirror/www.saintjosephdescarmes.com/. site/
          elif [ -d "_mirror/saintjosephdescarmes.com" ]; then
            cp -r _mirror/saintjosephdescarmes.com/. site/
          else
            echo "❌ Dossier de miroir introuvable"
            ls _mirror/
            exit 1
          fi

          echo "📂 Structure du dossier site/ :"
          find site -type f | wc -l

      # --------------------------------------------------------
      # 5️⃣ Réécrire toutes les URLs absolues → relatives
      # --------------------------------------------------------
      - name: Rewrite absolute URLs to relative (Python)
        run: |
          python3 <<'EOF'
import os, re

# Variantes d'URL que wget a pu laisser dans les fichiers
DOMAIN_VARIANTS = [
    "https://www.saintjosephdescarmes.com",
    "http://www.saintjosephdescarmes.com",
    "https://saintjosephdescarmes.com",
    "http://saintjosephdescarmes.com",
    "//www.saintjosephdescarmes.com",
    "//saintjosephdescarmes.com"
]

# Extensions à traiter (HTML, CSS, JS, JSON, XML, SVG …)
EXTENSIONS = (".html", ".htm", ".css", ".js", ".json", ".xml", ".svg")

def rewrite(content: str) -> str:
    for d in DOMAIN_VARIANTS:
        # Remplace « https://…/ » → « / »
        content = content.replace(d + "/", "/")
        # Remplace l'URL brute (sans slash final) → « / »
        content = content.replace(d, "/")
    return content

changed = 0
for root, _, files in os.walk("site"):
    for name in files:
        if name.lower().endswith(EXTENSIONS):
            path = os.path.join(root, name)
            try:
                with open(path, "r", encoding="utf-8", errors="replace") as f:
                    orig = f.read()
                new = rewrite(orig)
                if new != orig:
                    with open(path, "w", encoding="utf-8") as f:
                        f.write(new)
                    changed += 1
            except Exception as e:
                print(f"⚠️ Erreur sur {path}: {e}")
print(f"✅ URLs réécrites dans {changed} fichiers")
EOF

      # --------------------------------------------------------
      # 6️⃣ Remplacer le mot « Chanteur(s) » → « Rapeur(s) » partout
      # --------------------------------------------------------
      - name: Replace word in all files (HTML, CSS, JS)
        run: |
          find site -type f \( -name "*.html" -o -name "*.htm" -o -name "*.css" -o -name "*.js" \) \
            -exec sed -i 's/Chanteur/Rapeur/gi' {} +
          echo "✅ Remplacement texte effectué"

      # --------------------------------------------------------
      # 7️⃣ Injecter un MutationObserver dans chaque page HTML
      # --------------------------------------------------------
      - name: Inject MutationObserver (dynamic replacement)
        run: |
          python3 <<'EOF'
import os

SCRIPT = """<script>
(function(){
  // Fonction qui parcourt le DOM et remplace le texte
  function walk(node){
    if(node.nodeType===Node.TEXT_NODE){
      node.nodeValue=node.nodeValue.replace(/Chanteur/gi,"Rapeur");
    }else{
      for(var i=0;i<node.childNodes.length;i++) walk(node.childNodes[i]);
    }
  }
  // Au chargement initial
  document.addEventListener("DOMContentLoaded",function(){walk(document.body);});
  // Sur les ajouts dynamiques (pop‑ups, overlays, etc.)
  new MutationObserver(function(mutations){
    mutations.forEach(function(m){
      m.addedNodes.forEach(function(n){walk(n);});
    });
  }).observe(document.documentElement,{childList:true,subtree:true});
})();
</script>"""

count=0
for root,_,files in os.walk("site"):
    for f in files:
        if f.lower().endswith(('.html','.htm')):
            path=os.path.join(root,f)
            try:
                with open(path,'r',encoding='utf-8',errors='replace') as fh:
                    content=fh.read()
                if "</body>" in content:
                    new_content=content.replace("</body>",SCRIPT+"</body>",1)
                    with open(path,'w',encoding='utf-8') as fh:
                        fh.write(new_content)
                    count+=1
            except Exception as e:
                print(f"⚠️ Erreur sur {path}: {e}")
print(f"✅ MutationObserver injecté dans {count} fichiers HTML")
EOF

      # --------------------------------------------------------
      # 8️⃣ Statistiques du site généré (facultatif, pour debug)
      # --------------------------------------------------------
      - name: Statistics
        run: |
          echo "=== Site stats ==="
          echo "HTML files   : $(find site -name '*.html' -o -name '*.htm' | wc -l)"
          echo "CSS files    : $(find site -name '*.css' | wc -l)"
          echo "JS files     : $(find site -name '*.js' | wc -l)"
          echo "Images       : $(find site \( -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.svg' -o -name '*.webp' -o -name '*.gif' \) | wc -l)"
          echo "Total files  : $(find site -type f | wc -l)"
          echo "Size         : $(du -sh site | cut -f1)"
          echo "==================="

      # --------------------------------------------------------
      # 9️⃣ Commit le dossier complet `site/` dans le dépôt
      # --------------------------------------------------------
      - name: Commit mirrored site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/
          # Si aucun changement (ex. première exécution), on ne commit pas
          if git diff --cached --quiet; then
            echo "✅ Aucun changement à committer"
          else
            git commit -m "🔄 Mirror site mis à jour le $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi

      # --------------------------------------------------------
      # 10️⃣ Publier le dossier `site/` sur GitHub Pages
      # --------------------------------------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # --------------------------------------------------------
      # 11️⃣ Résumé final
      # --------------------------------------------------------
      - name: Summary
        if: always()
        run: |
          echo "✅ Déploiement terminé"
          echo "🔗 URL du site : ${{ steps.deployment.outputs.page_url }}"
          echo "⏰ Prochain run dans 1 heure (cron)"
