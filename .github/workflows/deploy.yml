name: Mirror & Deploy Direct

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    # On définit l'environnement pour GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirroring (Correction 404)
        run: |
          rm -rf site && mkdir site
          wget \
            --mirror \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --no-parent \
            --no-host-directories \
            --directory-prefix=site \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true

      - name: Python Fix (Rappeur)
        shell: python
        run: |
          import os, re
          # Remplacement "Chanteur" -> "Rappeur" (2 'p')
          for root, _, files in os.walk("site"):
              for f in files:
                  path = os.path.join(root, f)
                  if f.lower().endswith(('.html', '.htm', '.js', '.css')):
                      try:
                          with open(path, 'r', encoding='utf-8', errors='ignore') as file:
                              content = file.read()
                          content = content.replace("Chanteur", "Rappeur").replace("chanteur", "rappeur")
                          with open(path, 'w', encoding='utf-8') as file:
                              file.write(content)
                      except: pass

      - name: Anti-Jekyll
        run: touch site/.nojekyll

      # ÉTAPE CLÉ 1 : Créer le paquet pour GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      # ÉTAPE CLÉ 2 : Envoyer le paquet au déploiement
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
