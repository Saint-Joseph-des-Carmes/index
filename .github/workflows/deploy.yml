name: Deploy to Vercel

on:
  push:
    branches: [ main ]            # déclenche le déploiement à chaque push sur main
  workflow_dispatch:             # permet de lancer le workflow manuellement

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Installer Node
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'       # même version que le runtime Vercel

      # 3️⃣ Installer les dépendances
      - name: Install dependencies
        run: npm ci                # utilise le lockfile (si présent)

      # 4️⃣ Build (ici rien à faire – le code est déjà prêt)
      - name: Verify build
        run: |
          echo "✅ Dependencies installed"
          # Vous pouvez ajouter des tests ici (npm test)

      # 5️⃣ Déployer sur Vercel
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}          # token d’accès API Vercel
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}      # ID de votre organisation Vercel
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }} # ID du projet Vercel
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment production   # récupère la configuration du projet
          vercel --prod --token $VERCEL_TOKEN         # déploie en prod

      # 6️⃣ (Optionnel) Publier l’URL du déploiement en tant que commentaire
      - name: Post deployment URL
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const url = process.env.VERCEL_URL || 'URL inconnue';
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request?.number || 1,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Déploiement Vercel terminé : https://${process.env.VERCEL_URL}`
            })
