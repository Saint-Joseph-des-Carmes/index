name: Mirror Complet - Correction Rappeur & Deploy Fix

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  mirror-and-deploy:
    # C'est ici qu'on corrige l'erreur "Missing environment"
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget python3
          pip3 install --quiet beautifulsoup4 lxml

      - name: Mirror with wget (Fix 404)
        run: |
          rm -rf site
          mkdir -p site
          # -nH (no-host-directories) met l'index.html à la racine du dossier site
          wget \
            --mirror \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --no-parent \
            --no-host-directories \
            --directory-prefix=site \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true

      - name: Python Processing (Rappeur + Injection)
        shell: python
        run: |
          import os, re
          from bs4 import BeautifulSoup

          INJECTION = """<script>
          (function(){
            function fix(node){
              if(node.nodeType===3){
                node.nodeValue=node.nodeValue.replace(/Chanteur/gi,"Rappeur");
              } else {
                node.childNodes.forEach(fix);
              }
            }
            new MutationObserver(muts => muts.forEach(m => m.addedNodes.forEach(fix))).observe(document, {childList:true, subtree:true});
            window.addEventListener('DOMContentLoaded', () => fix(document.body));
          })();
          </script>"""

          for root, _, files in os.walk("site"):
              for f in files:
                  path = os.path.join(root, f)
                  if f.lower().endswith(('.html', '.htm', '.js', '.css', '.txt', '.json')):
                      try:
                          with open(path, 'r', encoding='utf-8', errors='ignore') as fh:
                              content = fh.read()
                          
                          # Remplacement systématique avec correction orthographique
                          content = re.sub(r'Chanteur', 'Rappeur', content)
                          content = re.sub(r'chanteur', 'rappeur', content)
                          
                          if f.lower().endswith(('.html', '.htm')) and "</body>" in content.lower():
                              content = content.replace("</body>", INJECTION + "</body>")
                          
                          with open(path, 'w', encoding='utf-8') as fh:
                              fh.write(content)
                      except: pass

      - name: Commit changes (Visualisation)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/
          if git diff --cached --quiet; then
            echo "Aucun changement"
          else
            git commit -m "Mirror update : $(date -u)"
            git push origin main
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
