# .github/workflows/ci-npm.yml
name: CI – npm (sans npm ci)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      # 1️⃣ Checkout du repo
      - uses: actions/checkout@v4

      # 2️⃣ Installer Node.js + activer le cache npm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'          # ou la version que tu veux
          cache: 'npm'                  # active le cache intégré

      # 3️⃣ **npm install** – crée package‑lock.json s’il n’existe pas
      - name: Install dependencies
        run: |
          npm install   # crée / met à jour package-lock.json
          # (optionnel) vérifier le lock‑file
          git diff --exit-code package-lock.json || echo "🔧 lock‑file mis à jour"

      # 4️⃣ Lancer les tests (ou le build) – à adapter à ton projet
      - name: Run tests
        run: |
          # npm test   <-- décommente si tu as un script test
          echo "✅ Aucun test défini – ajoute `npm test` si besoin"

      # 5️⃣ (Optionnel) Build de production
      - name: Build
        run: |
          # npm run build   <-- décommente si tu as un script build
          echo "✅ Aucun build défini – ajoute `npm run build` si besoin"

      # 6️⃣ (Optionnel) Déploiement – Vercel, GitHub Pages, etc.
      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment production
          vercel --prod --token $VERCEL_TOKEN
