name: Mirror, Fix, and Deploy Site

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirroring Website
        run: |
          echo "Nettoyage du répertoire de travail..."
          # On garde le fichier maître qui ne doit pas être supprimé
          find . -maxdepth 1 -type f -not -name 'les-petits-rappeurs-force-bg.html' -delete
          find . -maxdepth 1 -mindepth 1 -type d -not -name '.git' -not -name '.github' -exec rm -rf {} +
          
          echo "Démarrage du mirroring du site..."
          wget \
            --mirror \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --span-hosts \
            --domains=www.saintjosephdescarmes.com,static.wixstatic.com,static.parastorage.com \
            --no-parent \
            --no-host-directories \
            -e robots=off \
            --directory-prefix=. \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true
      
      - name: Force Custom Background Page
        run: |
          # On écrase la page téléchargée avec notre version maîtrisée
          if [ -f "les-petits-rappeurs-force-bg.html" ]; then
            echo "Remplacement de les-petits-rappeurs.html par la version maîtrisée."
            mv -f les-petits-rappeurs-force-bg.html les-petits-rappeurs.html
          else
            echo "Fichier maître non trouvé. L'opération est annulée."
          fi

      - name: Process Files for Text Replacement
        shell: python
        run: |
          import os
          import shutil

          TEXT_REPLACEMENTS = {
              "Chanteur": "Rappeur",
              "chanteur": "rappeur",
              "Cœur": "Projet",
              "cœur": "projet"
          }

          # On applique les changements de texte sur tous les fichiers pertinents
          for root, _, files in os.walk('.'):
              if '.git' in root or '.github' in root:
                  continue
              for f in files:
                  if f.lower().endswith(('.html', '.htm', '.css', '.js')):
                      file_path = os.path.join(root, f)
                      try:
                          with open(file_path, 'r', encoding='utf-8', errors='ignore') as file:
                              content = file.read()
                          
                          original_content = content
                          for old, new in TEXT_REPLACEMENTS.items():
                              content = content.replace(old, new)
                          
                          if content != original_content:
                              with open(file_path, 'w', encoding='utf-8') as file:
                                  file.write(content)
                              print(f"Remplacement de texte effectué sur {file_path}")

                      except Exception as e:
                          print(f"Erreur lors du traitement de {file_path}: {e}")

      - name: Fix Jekyll
        run: touch .nojekyll

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --staged --quiet; then
            echo "Aucun changement détecté."
          else
            echo "Changements détectés, création du commit..."
            git commit -m "BOT: Force la page des rappeurs avec arrière-plan maîtrisé"
            git push
          fi

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
