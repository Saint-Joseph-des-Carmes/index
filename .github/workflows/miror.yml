name: Mirror Final - Animation Recovery

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirroring (Copie Conforme)
        run: |
          rm -rf site && mkdir site
          # On simplifie les options pour éviter de casser les scripts internes
          wget \
            --mirror \
            --page-requisites \
            --adjust-extension \
            --no-parent \
            --no-host-directories \
            -e robots=off \
            --directory-prefix=site \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true

      - name: Injection Discrète
        shell: python
        run: |
          import os, re

          # Ce script ne remplace le texte que SI l'animation l'a déjà fait apparaître
          js_injector = """
          <script>
          window.addEventListener('load', function() {
              const targetNode = document.body;
              const config = { childList: true, subtree: true, characterData: true };
              
              const callback = function(mutationsList) {
                  for(const mutation of mutationsList) {
                      if (mutation.type === 'childList' || mutation.type === 'characterData') {
                          walkAndReplace(targetNode);
                      }
                  }
              };

              function walkAndReplace(node) {
                  if (node.nodeType === 3) {
                      const text = node.nodeValue;
                      const replacedText = text.replace(/Chanteur/g, 'Rappeur').replace(/chanteur/g, 'rappeur');
                      if (replacedText !== text) {
                          node.nodeValue = replacedText;
                      }
                  } else if (node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
                      node.childNodes.forEach(walkAndReplace);
                  }
              }

              const observer = new MutationObserver(callback);
              observer.observe(targetNode, config);
              walkAndReplace(targetNode);
          });
          </script>
          """

          for root, _, files in os.walk("site"):
              for f in files:
                  path = os.path.join(root, f)
                  if f.lower().endswith(('.html', '.htm')):
                      try:
                          with open(path, 'r', encoding='utf-8', errors='ignore') as file:
                              content = file.read()
                          
                          # On l'injecte tout en haut du <head> pour être sûr qu'il surveille tout
                          if "<head>" in content.lower():
                              new_content = re.sub(r'(?i)<head>', f'<head>{js_injector}', content)
                              with open(path, 'w', encoding='utf-8') as file:
                                  file.write(new_content)
                      except: pass

      - name: Fix Jekyll
        run: touch site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
