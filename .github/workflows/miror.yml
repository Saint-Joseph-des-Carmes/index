name: Mirror, Fix, and Deploy Site

on:
  push:
    branches:
      - main # Se déclenche sur un push, mais on évitera les boucles
  schedule:
    - cron: '0 2 * * *' # Exécution programmée toutes les nuits à 2h
  workflow_dispatch: # Permet le lancement manuel

permissions:
  contents: write # Indispensable pour pouvoir pousser des commits
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On récupère tout l'historique pour une meilleure gestion des diffs
          fetch-depth: 0

      - name: Mirroring Website
        run: |
          # On nettoie le contenu précédent sauf le dossier .git et le workflow lui-même
          echo "Nettoyage du répertoire de travail..."
          find . -maxdepth 1 ! -name '.git' ! -name '.github' ! -name '.' -exec rm -rf {} +
          
          echo "Démarrage du mirroring..."
          wget \
            --mirror \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --span-hosts \
            --domains=www.saintjosephdescarmes.com,static.wixstatic.com \
            --no-parent \
            --no-host-directories \
            -e robots=off \
            --directory-prefix=. \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true
      
      - name: Remplacement du contenu et renommage des fichiers
        shell: python
        run: |
          import os
          import re
          import shutil

          # --- Configuration ---
          # Le site est maintenant à la racine du dépôt
          site_dir = "." 
          replacements = {
              "Chanteur": "Rappeur",
              "chanteur": "rappeur",
              "Cœur": "Projet",
              "cœur": "projet"
          }

          # --- Fonctions ---
          def replace_content_in_file(path):
              try:
                  with open(path, 'r', encoding='utf-8', errors='ignore') as file:
                      content = file.read()
                  
                  original_content = content
                  
                  for old, new in replacements.items():
                      content = content.replace(old, new)
                  
                  # Rendre les URLs d'images relatives à la racine
                  content = re.sub(r'https?://static\.wixstatic\.com/media/', r'/media/', content)

                  if content != original_content:
                      with open(path, 'w', encoding='utf-8') as file:
                          file.write(content)
              except Exception as e:
                  print(f"Erreur (contenu) sur {path}: {e}")

          def rename_files_and_dirs(root_dir):
              for dirpath, dirnames, filenames in os.walk(root_dir, topdown=False):
                  # Ne pas toucher au dossier .git ou .github
                  if '.git' in dirpath or '.github' in dirpath:
                      continue

                  for name_list, is_dir in [(filenames, False), (dirnames, True)]:
                      for name in name_list:
                          for old, new in replacements.items():
                              if old in name:
                                  old_path = os.path.join(dirpath, name)
                                  new_name = name.replace(old, new)
                                  new_path = os.path.join(dirpath, new_name)
                                  try:
                                      print(f"Renommage {'dossier' if is_dir else 'fichier'}: {old_path} -> {new_path}")
                                      shutil.move(old_path, new_path)
                                  except Exception as e:
                                      print(f"Erreur (renommage) sur {old_path}: {e}")
                                  break # On passe au fichier/dossier suivant après un renommage

          # --- Exécution ---
          print("1. Remplacement du contenu...")
          for root, _, files in os.walk(site_dir):
              if '.git' in root or '.github' in root:
                  continue
              for f in files:
                  if f.lower().endswith(('.html', '.htm', '.css', '.js')):
                      replace_content_in_file(os.path.join(root, f))
          
          print("2. Renommage des fichiers et dossiers...")
          rename_files_and_dirs(site_dir)

      - name: Fix Jekyll
        run: touch .nojekyll

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          # On vérifie s'il y a des changements à commiter
          if git diff --staged --quiet; then
            echo "Aucun changement détecté, pas de commit nécessaire."
          else
            echo "Changements détectés, création du commit..."
            git commit -m "BOT: Mise à jour automatique du site miroir" -m "Ce commit a été généré automatiquement par le workflow GitHub Actions."
            git push origin main
          fi

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Le chemin est maintenant la racine du dépôt
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
