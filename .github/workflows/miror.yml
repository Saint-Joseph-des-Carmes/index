name: Mirror Quotidien - Animation & Text Fix

on:
  push:
    branches: [main]
  schedule:
    # Déclenchement automatique une fois par jour à minuit UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Permet de lancer manuellement si besoin

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirroring (Copie Conforme)
        run: |
          rm -rf site && mkdir site
          # On garde les fichiers intacts pour ne pas casser le JS original
          wget \
            --mirror \
            --page-requisites \
            --adjust-extension \
            --no-parent \
            --no-host-directories \
            -e robots=off \
            --directory-prefix=site \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true

      - name: Injection du Correcteur Dynamique
        shell: python
        run: |
          import os, re

          # Ce script injecté surveille les changements du DOM (animations) 
          # et remplace le texte sans casser les scripts d'origine.
          js_injector = """
          <script>
          (function(){
            const replaceText = (node) => {
              if (node.nodeType === 3) {
                const newText = node.nodeValue.replace(/Chanteur/g, 'Rappeur').replace(/chanteur/g, 'rappeur');
                if (newText !== node.nodeValue) node.nodeValue = newText;
              } else if (node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
                node.childNodes.forEach(replaceText);
              }
            };
            
            // Correction au chargement
            window.addEventListener('load', () => replaceText(document.body));
            
            // Correction en temps réel pour les animations (MutationObserver)
            const observer = new MutationObserver(mutations => {
              mutations.forEach(m => m.addedNodes.forEach(replaceText));
              // Surveille aussi les changements de texte dans les noeuds existants
              if (mutations.some(m => m.type === 'characterData')) replaceText(document.body);
            });
            observer.observe(document.documentElement, {childList: true, subtree: true, characterData: true});
          })();
          </script>
          """

          for root, _, files in os.walk("site"):
              for f in files:
                  path = os.path.join(root, f)
                  if f.lower().endswith(('.html', '.htm')):
                      try:
                          with open(path, 'r', encoding='utf-8', errors='ignore') as file:
                              content = file.read()
                          
                          # Injection propre avant la fermeture du body
                          if "</body>" in content.lower():
                              new_content = re.sub(r'(?i)</body>', f'{js_injector}</body>', content)
                              with open(path, 'w', encoding='utf-8') as file:
                                  file.write(new_content)
                      except: pass

      - name: Fix Jekyll
        run: touch site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
