name: Mirror, Fix, and Deploy Site

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror HTML/CSS/JS only (no images)
        run: |
          echo "Mirroring site without images..."
          wget \
            --mirror \
            --adjust-extension \
            --convert-links \
            --span-hosts \
            --domains=www.saintjosephdescarmes.com,static.parastorage.com \
            --reject=jpg,jpeg,png,webp,avif,gif,svg,ico \
            --no-parent \
            --no-host-directories \
            -e robots=off \
            --directory-prefix=. \
            --user-agent="Mozilla/5.0" \
            https://www.saintjosephdescarmes.com || true

      - name: Download custom background image
        run: |
          wget -O petits-rappeurs.png "https://raw.githubusercontent.com/JavaBatchCSS/publique/refs/heads/master/petits-rappeurs.png"

      - name: Process Files (Replace text + Inject JS/CSS)
        shell: python
        run: |
          import os, re, shutil

          SITE_DIR = "."

          TEXT_REPLACEMENTS = {
              "Chanteur": "Rappeur",
              "chanteur": "rappeur",
              "Cœur": "Projet",
              "cœur": "projet"
          }

          STYLE_BLOCK = """
          <style id="custom-bg-style">
              #pageBackground_ib0se {
                  background-image: url('/petits-rappeurs.png') !important;
                  background-size: cover !important;
                  background-position: center center !important;
                  background-repeat: no-repeat !important;
                  background-color: #000000 !important;
              }
              #bgMedia_pageBackground_ib0se,
              #bgMedia_pageBackground_ib0se > wow-image,
              #bgMedia_pageBackground_ib0se > wow-image > img {
                  display: none !important;
              }
          </style>
          </head>
          """

          SCRIPT_BLOCK = """<script>
          const newURL = "/petits-rappeurs.png";

          function replaceImage() {
              document.querySelectorAll('img[src*="c1f88d_c781278"]').forEach(img => {
                  img.src = newURL;
              });

              document.querySelectorAll('[style*="c1f88d_c781278"]').forEach(el => {
                  el.style.backgroundImage = `url("${newURL}")`;
              });
          }

          document.addEventListener("DOMContentLoaded", replaceImage);

          const observer = new MutationObserver(() => replaceImage());
          observer.observe(document.documentElement, { childList: true, subtree: true });
          </script>"""

          def process_file(path):
              try:
                  with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                      content = f.read()

                  original = content

                  for old, new in TEXT_REPLACEMENTS.items():
                      content = content.replace(old, new)

                  if os.path.basename(path) == "les-petits-rappeurs.html":
                      content = content.replace('</head>', STYLE_BLOCK, 1)
                      content = content.replace('<head>', f'<head>\n{SCRIPT_BLOCK}', 1)

                  if content != original:
                      with open(path, 'w', encoding='utf-8') as f:
                          f.write(content)
                      print("Updated:", path)

              except Exception as e:
                  print("Error:", path, e)

          for root, _, files in os.walk(SITE_DIR):
              if '.git' in root or '.github' in root:
                  continue
              for f in files:
                  if f.lower().endswith(('.html', '.htm', '.css', '.js')):
                      process_file(os.path.join(root, f))

      - name: Fix Jekyll
        run: touch .nojekyll

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --staged --quiet; then
            echo "No changes."
          else:
            git commit -m "BOT: Update site + replace Wix image with custom background"
            git push origin main

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
