name: Mirror, Fix, and Deploy Site

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirroring Website (Optimized)
        run: |
          # Nettoyage complet du répertoire, car nous reconstruisons tout
          echo "Nettoyage du répertoire de travail..."
          find . -maxdepth 1 ! -name '.git' ! -name '.github' ! -name '.' -exec rm -rf {} +
          
          echo "Démarrage du mirroring (sans les images Wix)..."
          wget \
            --mirror \
            --adjust-extension \
            --convert-links \
            --span-hosts \
            --domains=www.saintjosephdescarmes.com,static.parastorage.com \
            --no-parent \
            --no-host-directories \
            -e robots=off \
            --reject-regex='.*\.(jpg|jpeg|gif|png|mp3|mp4|avi|svg)$' \
            --directory-prefix=. \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true

      - name: Replace Content and Background Image URL
        shell: python
        run: |
          import os
          import re
          import shutil

          site_dir = "."
          
          # Dictionnaire des remplacements de texte
          text_replacements = {
              "Chanteur": "Rappeur",
              "chanteur": "rappeur",
              "Cœur": "Projet",
              "cœur": "projet"
          }

          # URL de l'image à remplacer et nouvelle URL
          old_image_url_pattern = "https://static.wixstatic.com/media/c1f88d_c7812789919b4a7abab02478a2958e6b~mv2_d_3307_2205_s_2.jpg/v1/fill/w_1223,h_749,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/c1f88d_c7812789919b4a7abab02478a2958e6b~mv2_d_3307_2205_s_2.jpg"
          new_image_url = "https://raw.githubusercontent.com/JavaBatchCSS/publique/refs/heads/master/petits-rappeurs.png"

          def process_file(path):
              try:
                  with open(path, 'r', encoding='utf-8', errors='ignore') as file:
                      content = file.read()
                  
                  original_content = content
                  
                  # 1. Remplacer l'URL de l'image de fond
                  content = content.replace(old_image_url_pattern, new_image_url)

                  # 2. Effectuer les remplacements de texte
                  for old, new in text_replacements.items():
                      content = content.replace(old, new)
                  
                  # 3. Remplacer les autres URLs statiques
                  content = re.sub(r'https?://static\.wixstatic\.com/media/', r'/media/', content)

                  if content != original_content:
                      print(f"Modification du contenu de : {path}")
                      with open(path, 'w', encoding='utf-8') as file:
                          file.write(content)
              except Exception as e:
                  print(f"Erreur lors du traitement de {path}: {e}")

          def rename_files_and_dirs(root_dir):
              # Cette fonction est conservée pour renommer les fichiers si nécessaire
              for dirpath, dirnames, filenames in os.walk(root_dir, topdown=False):
                  if '.git' in dirpath or '.github' in dirpath:
                      continue
                  for name_list, is_dir in [(filenames, False), (dirnames, True)]:
                      for name in name_list:
                          for old, new in text_replacements.items():
                              if old in name:
                                  old_path = os.path.join(dirpath, name)
                                  new_name = name.replace(old, new)
                                  new_path = os.path.join(dirpath, new_name)
                                  try:
                                      shutil.move(old_path, new_path)
                                  except Exception as e:
                                      print(f"Erreur de renommage sur {old_path}: {e}")
                                  break

          print("1. Remplacement du contenu et de l'URL de l'image de fond...")
          for root, _, files in os.walk(site_dir):
              if '.git' in root or '.github' in root:
                  continue
              for f in files:
                  # Nous ciblons les fichiers qui pourraient contenir des URLs
                  if f.lower().endswith(('.html', '.htm', '.css', '.js', '.json')):
                      process_file(os.path.join(root, f))
          
          print("2. Renommage des fichiers et dossiers...")
          rename_files_and_dirs(site_dir)
      
      - name: Fix Jekyll
        run: touch .nojekyll

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --staged --quiet; then
            echo "Aucun changement détecté, pas de commit nécessaire."
          else
            echo "Changements détectés, création du commit..."
            git commit -m "BOT: Mise à jour auto du site et remplacement de l'arrière-plan" -m "Ce commit a été généré automatiquement par le workflow GitHub Actions."
            git push origin main
          fi

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
