name: Mirror Final - Animation Fix

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirroring
        run: |
          rm -rf site && mkdir site
          wget \
            --mirror \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --no-parent \
            --no-host-directories \
            -e robots=off \
            --directory-prefix=site \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true

      - name: Remplacement du contenu (texte et lien)
        shell: python
        run: |
          import os

          # URL à remplacer et nouvelle URL
          url_originale = "https://static.wixstatic.com/media/c1f88d_c7812789919b4a7abab02478a2958e6b~mv2_d_3307_2205_s_2.jpg/v1/fill/w_1223,h_948,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/c1f88d_c7812789919b4a7abab02478a2958e6b~mv2_d_3307_2205_s_2.jpg"
          url_nouvelle = "blob:https://gemini.google.com/b60a22eb-e65f-4643-8cf3-fe36a54acc5a"

          for root, _, files in os.walk("site"):
              for f in files:
                  path = os.path.join(root, f)
                  # On cible les fichiers HTML, mais aussi les fichiers CSS ou JS où l'URL pourrait se trouver
                  if f.lower().endswith(('.html', '.htm', '.css', '.js')):
                      try:
                          with open(path, 'r', encoding='utf-8', errors='ignore') as file:
                              content = file.read()
                          
                          # Remplacement 1: Chanteur -> Rappeur
                          content = content.replace('Chanteur', 'Rappeur')
                          content = content.replace('chanteur', 'rappeur')

                          # Remplacement 2: URL de l'image
                          content = content.replace(url_originale, url_nouvelle)
                          
                          with open(path, 'w', encoding='utf-8') as file:
                              file.write(content)
                      except Exception as e:
                          print(f"Erreur lors du traitement du fichier {path}: {e}")
                          pass

      - name: Fix Jekyll
        run: touch site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
