name: Mirror Final - Animation Fix

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirroring
        run: |
          rm -rf site && mkdir site
          wget \
            --mirror \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --no-parent \
            --no-host-directories \
            -e robots=off \
            --directory-prefix=site \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://www.saintjosephdescarmes.com || true

      - name: Remplacement par Injection (Zéro modification HTML direct)
        shell: python
        run: |
          import os, re

          # Ce script est beaucoup plus robuste : il attend que la page et ses scripts soient prêts
          # Il scanne tout, même ce qui apparaît après une animation
          js_injector = """
          <script>
          (function(){
            const replaceText = (node) => {
              if (node.nodeType === 3) {
                const newText = node.nodeValue.replace(/Chanteur/g, 'Rappeur').replace(/chanteur/g, 'rappeur');
                if (newText !== node.nodeValue) node.nodeValue = newText;
              } else if (node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
                node.childNodes.forEach(replaceText);
              }
            };
            
            // 1. Remplace au chargement
            window.addEventListener('load', () => replaceText(document.body));
            
            // 2. Remplace dès qu'une animation ajoute du texte (ex: ton texte qui apparaît après 2s)
            const observer = new MutationObserver(mutations => {
              mutations.forEach(m => m.addedNodes.forEach(replaceText));
            });
            observer.observe(document.documentElement, {childList: true, subtree: true});
          })();
          </script>
          """

          for root, _, files in os.walk("site"):
              for f in files:
                  path = os.path.join(root, f)
                  if f.lower().endswith(('.html', '.htm')):
                      try:
                          with open(path, 'r', encoding='utf-8', errors='ignore') as file:
                              content = file.read()
                          
                          # On injecte le script juste avant la fin du body
                          # On ne modifie RIEN d'autre dans le HTML original
                          if "</body>" in content.lower():
                              new_content = re.sub(r'(?i)</body>', f'{js_injector}</body>', content)
                              with open(path, 'w', encoding='utf-8') as file:
                                  file.write(new_content)
                      except: pass

      - name: Fix Jekyll
        run: touch site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
